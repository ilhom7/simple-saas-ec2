name: Deploy App to EC2

on:
  push:
    branches:
      - main
      - "feat/**"
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"

  workflow_dispatch:

  issue_comment:
    types:
      - created

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: read
  statuses: write

concurrency:
  group: deploy-simple-saas-ec2
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/deploy') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )

    runs-on: ubuntu-latest

    steps:
      - name: Get PR branch info
        if: github.event_name == 'issue_comment'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"

          HEAD_REF=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefName \
            --jq '.headRefName')

          HEAD_SHA=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json headRefOid \
            --jq '.headRefOid')

          echo "head_ref=$HEAD_REF" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          echo "PR branch: $HEAD_REF"
          echo "PR SHA: $HEAD_SHA"

      - name: Set PR deploy status to pending
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }}" \
            -f state="pending" \
            -f context="Deploy App to EC2" \
            -f description="Deployment is running..." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Checkout repository
        if: github.event_name != 'issue_comment'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get Terraform outputs
        id: tf_outputs
        working-directory: infra
        run: |
          terraform init

          EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)
          APP_URL=$(terraform output -raw alb_url)

          echo "ec2_public_ip=$EC2_PUBLIC_IP" >> $GITHUB_OUTPUT
          echo "app_url=$APP_URL" >> $GITHUB_OUTPUT

          echo "EC2 public IP: $EC2_PUBLIC_IP"
          echo "App URL: $APP_URL"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh

          if [ -z "${{ steps.tf_outputs.outputs.ec2_public_ip }}" ]; then
              echo "Terraform output ec2_public_ip is missing or empty"
              exit 1
          fi

          if [ -z "${{ secrets.EC2_USER }}" ]; then
              echo "EC2_USER secret is missing or empty"
              exit 1
          fi

          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
              echo "EC2_SSH_KEY secret is missing or empty"
              exit 1
          fi

          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

          ssh-keyscan -H "${{ steps.tf_outputs.outputs.ec2_public_ip }}" >> ~/.ssh/known_hosts

      - name: Copy app files to EC2
        run: |
          scp -i ~/.ssh/ec2_key -r app/* \
            ${{ secrets.EC2_USER }}@${{ steps.tf_outputs.outputs.ec2_public_ip }}:/opt/simple-saas-ec2/

      - name: Restart app on EC2
        run: |
          ssh -i ~/.ssh/ec2_key \
            ${{ secrets.EC2_USER }}@${{ steps.tf_outputs.outputs.ec2_public_ip }} << 'EOF'
              cd /opt/simple-saas-ec2
              docker compose down || true
              docker compose up -d --build
              docker ps
          EOF

      - name: Smoke test app through ALB
        run: |
          curl -f "${{ steps.tf_outputs.outputs.app_url }}/health"

      - name: Set PR deploy status to success
        if: success() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }}" \
            -f state="success" \
            -f context="Deploy App to EC2" \
            -f description="Deployment completed successfully." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Set PR deploy status to failure
        if: failure() && github.event_name == 'issue_comment' && steps.pr.outputs.head_sha != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/${{ steps.pr.outputs.head_sha }}" \
            -f state="failure" \
            -f context="Deploy App to EC2" \
            -f description="Deployment failed. Check the workflow logs." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Comment success on PR
        if: success() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "App deployed successfully to EC2."

      - name: Comment failure on PR
        if: failure() && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "App deployment failed. Check the GitHub Actions logs."